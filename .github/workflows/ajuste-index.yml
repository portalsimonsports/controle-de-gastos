name: Ajustar tela inicial

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ajuste-index.yml"

permissions:
  contents: write

jobs:
  ajustar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Remover texto informativo
        shell: python
        run: |
          from pathlib import Path

          arquivo = Path("index.html")
          texto = arquivo.read_text(encoding="utf-8")
          bloco = '''        <p>
          Página pública de acesso ao sistema. Os dados financeiros permanecem privados e somente são
          carregados após a validação do e-mail cadastrado e do código temporário enviado por mensagem.
        </p>
'''
          if bloco not in texto:
              raise SystemExit("Bloco informativo não encontrado no index.html")
          arquivo.write_text(texto.replace(bloco, "", 1), encoding="utf-8")

      - name: Publicar ajuste e remover workflow temporário
        run: |
          rm -f .github/workflows/ajuste-index.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/ajuste-index.yml
          git commit -m "Remove informações financeiras da tela de acesso"
          git push
