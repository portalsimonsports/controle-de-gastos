<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Controle de Gastos</title>
  <style>
    html,body{height:100%;margin:0;background:#0c1422;color:#eef4ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    body{display:grid;place-items:center}
    .carregando{padding:16px 20px;border:1px solid #263754;border-radius:14px;background:#121d30}
  </style>
</head>
<body>
  <div class="carregando">Carregando…</div>

  <script>
    fetch('./app.html?v=202607161030', {cache:'no-store'})
      .then(function(resposta){
        if(!resposta.ok){
          throw new Error('Falha ao carregar o sistema.');
        }
        return resposta.text();
      })
      .then(function(html){
        html = html.replace(
          /\s*<p>\s*Página pública de acesso ao sistema\. Os dados financeiros permanecem privados e somente são\s*carregados após a validação do e-mail cadastrado e do código temporário enviado por mensagem\.\s*<\/p>/i,
          ''
        );

        html = html.replace(
          /\s*<p class="muted small">\s*O e-mail precisa constar na aba\s*<strong>GERENCIAMENTO<\/strong>\.\s*<\/p>/i,
          ''
        );

        html = html.replace(
          /\s*<p class="muted small">\s*O backend grava somente as colunas A:H da aba Despesas\.\s*<\/p>/i,
          ''
        );

        html = html.replace(
          '</head>',
          '<link rel="stylesheet" href="./enhancements.css?v=202607142115"><link rel="stylesheet" href="./calendar-enhancements.css?v=202607142115"><link rel="stylesheet" href="./professional-confirm.css?v=202607142115"><link rel="stylesheet" href="./card-period.css?v=202607142115"><link rel="stylesheet" href="./fidelity.css?v=202607142115"><link rel="stylesheet" href="./bus-actions.css?v=202607142115"><link rel="stylesheet" href="./bilhetes-layout.css?v=202607142115"><link rel="stylesheet" href="./bilhete-controls.css?v=202607142115"><link rel="stylesheet" href="./junior-recorrencia.css?v=202607142115"><link rel="stylesheet" href="./mobile-data-fix.css?v=202607142115">' +
          '</head>'
        );

        html = html.replace(
          '</body>',
          '<script src="./enhancements.js?v=202607142115"><\/script><script src="./calendar-enhancements.js?v=202607142115"><\/script><script src="./professional-confirm.js?v=202607142115"><\/script><script src="./card-period.js?v=202607142115"><\/script><script src="./fidelity.js?v=202607142115"><\/script><script src="./bus-actions.js?v=202607142115"><\/script><script src="./bilhete-columns.js?v=202607142115"><\/script><script src="./bilhete-controls.js?v=202607142115"><\/script><script src="./junior-recorrencia.js?v=202607142115"><\/script><script src="./expense-ptbr.js?v=202607142115"><\/script><script src="./bilhete-delete-fix.js?v=202607142115"><\/script><script src="./mobile-data-fix.js?v=202607142115"><\/script><script src="./bus-null-fix.js?v=202607142115"><\/script><script src="./expense-view-mode.js?v=202607161030"><\/script>' +
          '</body>'
        );

        document.open();
        document.write(html);
        document.close();
      })
      .catch(function(erro){
        document.querySelector('.carregando').textContent =
          erro.message;
      });
  </script>
</body>
</html>
